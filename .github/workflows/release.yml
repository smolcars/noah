name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  signet-build:
    name: Build Android Signet App
    uses: ./.github/workflows/client.yml
    secrets: inherit

  mainnet-build:
    name: Build Android Mainnet Artifacts
    uses: ./.github/workflows/android-mainnet-artifacts.yml
    with:
      git_ref: ${{ github.ref }}
    secrets: inherit

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [signet-build, mainnet-build]
    permissions:
      contents: write
    steps:
      - name: 📥 Download signet APK artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.signet-build.outputs.apk_artifact_name }}
          path: release-assets/signet

      - name: 📥 Download mainnet APK artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.mainnet-build.outputs.apk_artifact_name }}
          path: release-assets/mainnet-apk

      - name: 📥 Download mainnet AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.mainnet-build.outputs.aab_artifact_name }}
          path: release-assets/mainnet-aab

      - name: 📝 Prepare release assets
        run: |
          set -euo pipefail
          mv "release-assets/signet/${{ needs.signet-build.outputs.apk_filename }}" \
            release-assets/noah-signet.apk
          mv "release-assets/mainnet-apk/${{ needs.mainnet-build.outputs.apk_filename }}" \
            release-assets/noah-mainnet.apk
          mv "release-assets/mainnet-aab/${{ needs.mainnet-build.outputs.aab_filename }}" \
            release-assets/noah-mainnet.aab

      - name: 🚀 Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME%.signet}"

          gh release create "${GITHUB_REF_NAME}" \
            release-assets/noah-signet.apk \
            release-assets/noah-mainnet.apk \
            release-assets/noah-mainnet.aab \
            --repo "${{ github.repository }}" \
            --title "Noah ${release_version}" \
            --generate-notes
