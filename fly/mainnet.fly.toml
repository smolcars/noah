# Fly app configuration for Noah mainnet.
#
# Managed Postgres is provisioned separately with `fly mpg create` and attached
# to this app with `fly mpg attach --variable-name POSTGRES_URL`.

app = "noah-mainnet"
primary_region = "iad"

[build]
  image = "niteshbalusu/noah-server:latest"

[deploy]
  strategy = "bluegreen"
  wait_timeout = "10m"

[env]
  LNURL_DOMAIN = "noahwallet.io"
  SERVER_NETWORK = "bitcoin"
  MAILBOX_WORKER_CONCURRENCY_LIMIT = "500"
  MAILBOX_WORKER_CLAIM_TTL_SECS = "120"
  MAILBOX_WORKER_CLAIM_RENEW_INTERVAL_SECS = "30"
  MAILBOX_WORKER_STREAM_IDLE_RECONNECT_SECS = "600"
  POSTGRES_MAX_CONNECTIONS = "20"
  REDIS_POOL_SIZE = "64"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
